
global:
  resolve_timeout: 1m

route:
  receiver: "default"

receivers:
  - name: "default"

route:
  receiver: "slack-notifications"

receivers:
  - name: "slack-notifications"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/no/Webhook/url   #alert manager and aleting is not configured yet 
        channel: "#prometheus-alerting"
        send_resolved: true